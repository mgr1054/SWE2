<mat-accordion multi="true" *ngIf="kunden.length > 0">
  <mat-expansion-panel *ngFor="let kunde of kunden">
    <mat-expansion-panel-header>
      {{ kunde.id }}
    </mat-expansion-panel-header>
    <p>{{ kunde.nachname }}</p>
    <mat-action-row>
      <button mat-button color="accent">Edit</button>
      <button mat-button color="warn">Delete</button>
    </mat-action-row>
  </mat-expansion-panel>
</mat-accordion>
<p class="info-text" *ngIf="kunden.length <= 0">No posts found</p>
