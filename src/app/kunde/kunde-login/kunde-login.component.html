<mat-card>
  <form (submit)="onLogin()" *ngIf="!laedt" [formGroup]="formLogin">
    <mat-list>
      <mat-list-item>
        <mat-form-field>
          <input matInput type="text" formControlName="username" placeholder="Username" />
          <mat-error *ngIf="formLogin.get('username').invalid">Please enter a valid username</mat-error>
        </mat-form-field>
        <mat-form-field>
          <input matInput type="password" formControlName="password" placeholder="Password" />
          <mat-error *ngIf="formLogin.get('password').invalid">Please enter a valid password</mat-error>
        </mat-form-field>
      </mat-list-item>
    </mat-list>
    <button mat-raised-button color="accent" type="submit">
      Save
    </button>
  </form>
</mat-card>
