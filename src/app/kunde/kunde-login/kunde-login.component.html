<div class="formular" *ngIf="!loggedstat">
  <mat-card *ngIf="!loggedstat">
    <form (submit)="onLogin()" *ngIf="!laedt && !loggedstat" [formGroup]="formLogin">
      <mat-card-header>
        <mat-card-title>LOGIN</mat-card-title>
      </mat-card-header>
      <mat-list>
        <mat-list-item>
          <mat-form-field>
            <input matInput type="text" formControlName="username" placeholder="Benutzername" />
            <mat-error *ngIf="formLogin.get('username').invalid">Bitte validen Benutzernamen eingeben</mat-error>
          </mat-form-field>
          <mat-form-field>
            <input matInput type="password" formControlName="password" placeholder="Passwort" />
            <mat-error *ngIf="formLogin.get('password').invalid">Bitte vaildes Passwort eingeben</mat-error>
          </mat-form-field>
        </mat-list-item>
      </mat-list>
      <button mat-raised-button color="accent" type="submit" class="button">
        Anmelden
      </button>
    </form>
  </mat-card>
</div>
<mat-card *ngIf="loggedstat">
  <h4>Sie sind bereits eingeloggt</h4>
  <button mat-raised-button color="accent" on-click="onViewProfile()" class="button">
    MyProfile
  </button>
  <button mat-raised-button color="accent" on-click="onLogout()" class="button">Logout</button>
</mat-card>
